site_name: Blowback — Listening Companion
site_description: Read-along notes and transcripts for the Blowback podcast
theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Light mode
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
nav:
  - Home: index.md
  - About & Methodology: about.md
  - Transcription Corrections: corrections.md
